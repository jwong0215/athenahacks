<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Study Sessions</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>

  <h1>Study Sessions</h1>

  <!-- search + filter -->
  <div>
    <input id="search-input" type="text" placeholder="Search by subject or title..." />
  </div>

  <!-- create session button + description -->
  <button id="toggle-create-form">+ Create Session</button>
  <div id="create-form-container" style="display:none;">
    <form id="create-session-form">
      <input id="session-title" type="text" placeholder="Session title" required />
      <select id="session-subject" required>
        <option value="">Select a subject</option>
      </select>  
      <select id="session-intent">
        <option value="focus">Focus (silent)</option>
        <option value="help">Help (Q&A)</option>
      </select>
      <select id="session-goal">
        <option value=""general">General</option>
        <option value="homework">Homework</option>
        <option value="exam prep">Exam prep</option>
      </select>
      <button type="submit">Create</button>
    </form>
  </div>

  <!-- sessions list -->
  <div id="sessions-list"></div>

  <script type="module" src="scripts/sessions.js"></script>
</body>
</html>
